name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v)"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        run: |
          python -m py_compile run.py src/*.py

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare appimagetool
        run: |
          curl -L "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -o /tmp/appimagetool.AppImage
          chmod +x /tmp/appimagetool.AppImage
          sudo mv /tmp/appimagetool.AppImage /usr/local/bin/appimagetool

      - name: Build Debian package
        run: |
          chmod +x packaging/build_deb.sh packaging/build_appimage.sh
          ./packaging/build_deb.sh "${{ steps.version.outputs.value }}"

      - name: Build AppImage
        run: |
          ./packaging/build_appimage.sh "${{ steps.version.outputs.value }}"

      - name: Publish release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.AppImage
